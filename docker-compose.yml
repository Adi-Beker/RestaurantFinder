services:
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend.Dockerfile
    container_name: restaurant-finder-backend
    ports:
      - "8000:8000"
    environment:
      - DB_PATH=/data/restaurants.db
      - REDIS_URL=redis://redis:6379
      - AI_SERVICE_URL=http://ai_service:8001
    volumes:
      - restaurant_data:/data
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: .
      dockerfile: backend.Dockerfile
    command: ["uv", "run", "arq", "worker.main.WorkerSettings"]
    environment:
      - DB_PATH=/data/restaurants.db
      - REDIS_URL=redis://redis:6379
    volumes:
      - restaurant_data:/data
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend.Dockerfile
    container_name: restaurant-finder-frontend
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy

  ai_service:
    build:
      context: .
      dockerfile: ai_service.Dockerfile
    container_name: restaurant-finder-ai
    ports:
      - "8001:8001"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  restaurant_data:
  redis_data:
