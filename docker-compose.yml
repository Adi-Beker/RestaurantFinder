services:
  backend:
    build:
      context: .
      dockerfile: backend.Dockerfile
    container_name: restaurant-finder-backend
    ports:
      - "8000:8000"
    environment:
      - DB_PATH=/data/restaurants.db
    volumes:
      - restaurant_data:/data

  frontend:
    build:
      context: .
      dockerfile: frontend.Dockerfile
    container_name: restaurant-finder-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  restaurant_data:
